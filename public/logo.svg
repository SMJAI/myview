<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 260">
  <defs>
    <!-- Gentle upward arc for PHYSIO -->
    <path id="topArc" d="M 38,88 A 182,182 0 0,1 242,88"/>
    <!-- Gentle downward arc for HEALING HANDS -->
    <path id="botArc" d="M 15,207 A 310,310 0 0,0 265,207"/>
  </defs>

  <!-- PHYSIO -->
  <text font-family="Arial,Helvetica,sans-serif" font-weight="bold"
        font-size="23" fill="#111111" letter-spacing="8">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">PHYSIO</textPath>
  </text>

  <!-- HEALING HANDS -->
  <text font-family="Arial,Helvetica,sans-serif" font-weight="bold"
        font-size="14" fill="#111111" letter-spacing="5.5">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">HEALING HANDS</textPath>
  </text>

  <!-- LEFT HAND (palm-up, thumb on right/inner side) -->
  <g fill="#1F9F70">
    <!-- Pinky (outermost left) -->
    <rect x="63" y="84" width="14" height="88" rx="7"/>
    <!-- Ring -->
    <rect x="79" y="75" width="15" height="97" rx="7.5"/>
    <!-- Middle (tallest) -->
    <rect x="96" y="71" width="15" height="101" rx="7.5"/>
    <!-- Index -->
    <rect x="113" y="75" width="14" height="97" rx="7"/>
    <!-- Palm -->
    <rect x="60" y="148" width="71" height="44" rx="11"/>
    <!-- Thumb (inner right, angled inward) -->
    <rect x="127" y="162" width="11" height="28" rx="5.5" transform="rotate(22,132,176)"/>
  </g>
  <!-- White finger-separation lines on left hand -->
  <rect x="77.5" y="84"  width="2" height="108" fill="white" opacity="0.6"/>
  <rect x="94.5" y="75"  width="2" height="117" fill="white" opacity="0.6"/>
  <rect x="111.5" y="75" width="2" height="117" fill="white" opacity="0.6"/>

  <!-- RIGHT HAND (mirror of left hand around x=140) -->
  <g fill="#1F9F70" transform="translate(280,0) scale(-1,1)">
    <rect x="63" y="84" width="14" height="88" rx="7"/>
    <rect x="79" y="75" width="15" height="97" rx="7.5"/>
    <rect x="96" y="71" width="15" height="101" rx="7.5"/>
    <rect x="113" y="75" width="14" height="97" rx="7"/>
    <rect x="60" y="148" width="71" height="44" rx="11"/>
    <rect x="127" y="162" width="11" height="28" rx="5.5" transform="rotate(22,132,176)"/>
  </g>
  <!-- White lines on right hand -->
  <g transform="translate(280,0) scale(-1,1)">
    <rect x="77.5" y="84"  width="2" height="108" fill="white" opacity="0.6"/>
    <rect x="94.5" y="75"  width="2" height="117" fill="white" opacity="0.6"/>
    <rect x="111.5" y="75" width="2" height="117" fill="white" opacity="0.6"/>
  </g>
</svg>
